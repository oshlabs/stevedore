name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Pinned tool versions — keep in sync with tmp/STEP-9-PLAN.md so CI and local runs match.
env:
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.5.0.1"
  GO_VERSION: "1.26"
  CRANE_VERSION: "v0.21.6"
  ORAS_VERSION: "v1.3.2"
  REGCTL_VERSION: "v0.11.5"
  # skopeo has no version-pinnable apt package, and newer skopeo rejects Docker media types in an
  # `oci:` layout (a strictness the round-trip test must read past). Pin the official image instead.
  SKOPEO_VERSION: "v1.22.2"
  # The sign-interop test drives cosign 3.x flags (--new-bundle-format, --use-signing-config,
  # --registry-referrers-mode). Pin the planned 3.0.6 — the installer's default cosign is a 2.x
  # that predates those flags. Needs cosign-installer >= v4 to fetch/verify 3.x releases.
  COSIGN_VERSION: "v3.0.6"

jobs:
  # ---------------------------------------------------------------------------
  # fast — the hermetic, offline PR gate. Format, warnings-as-errors, the
  # default `mix test` (9A/9B fold in here), and dialyzer. Required check.
  # ---------------------------------------------------------------------------
  fast:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    strategy:
      matrix:
        # Keep in sync with .tool-versions.
        include:
          - elixir: "1.19.5"
            otp: "28.5.0.1"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get

      - run: mix format --check-formatted

      - run: mix compile --warnings-as-errors

      - run: mix test

      - name: Cache dialyzer PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix dialyzer --format github

  # ---------------------------------------------------------------------------
  # compat — guard the lower Elixir bound declared in mix.exs (`~> 1.18`).
  # Compile (warnings-as-errors) + the hermetic suite only. Format and dialyzer
  # stay pinned to the .tool-versions toolchain in `fast`: formatter output is
  # version-sensitive, so we don't re-check it under the older Elixir.
  # ---------------------------------------------------------------------------
  compat:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    strategy:
      matrix:
        # The floor of mix.exs `elixir: "~> 1.18"`. OTP pinned to .tool-versions.
        include:
          - elixir: "1.18.4"
            otp: "28.5.0.1"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get

      - run: mix compile --warnings-as-errors

      - run: mix test

  # ---------------------------------------------------------------------------
  # external — the client (`Stevedore.Registry`/`copy`) against two real
  # registries that diverge on edge cases. STEP-9D, tag `:external`.
  #
  # Uses docker compose (not service containers) so zot's config file
  # (test/support/zot-config.json) is mounted from the checkout — service
  # containers start before checkout and can't see repo files.
  # ---------------------------------------------------------------------------
  external:
    # Heavy integration tier — only on main pushes, not PRs (PRs gate on fast + compat).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Start registry:2 + zot
        run: docker compose -f docker-compose.test.yml up -d

      # Block until both registries answer /v2/ so tests RUN (not skip). The
      # registry_test/3 macro skips on an unreachable registry — in CI we want
      # the cases exercised, so fail the job if they never come up.
      - name: Wait for registries
        run: |
          for url in http://localhost:5000/v2/ http://localhost:5001/v2/; do
            echo "waiting for $url"
            for i in $(seq 1 30); do
              if curl -sf -o /dev/null "$url"; then echo "  up"; break; fi
              if [ "$i" -eq 30 ]; then echo "  $url never came up"; exit 1; fi
              sleep 1
            done
          done

      - run: mix deps.get

      - run: mix test --include external --only external

      - name: Stop registries
        if: always()
        run: docker compose -f docker-compose.test.yml down

  # ---------------------------------------------------------------------------
  # conformance — the official OCI distribution-spec Go/Ginkgo suite against a
  # live Stevedore.Server. STEP-9C, tag `:conformance`. Needs a Go toolchain
  # (the support module clones the pinned spec tag and `go test -c`s it).
  # ---------------------------------------------------------------------------
  conformance:
    # Heavy integration tier — only on main pushes, not PRs (PRs gate on fast + compat).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      # The built conformance.test binary lives under _build/conformance and is
      # keyed on the pinned spec tag (v1.1.0), so it survives across runs.
      - name: Cache conformance binary
        uses: actions/cache@v4
        with:
          path: _build/conformance
          key: ${{ runner.os }}-conformance-v1.1.0

      - run: mix deps.get

      - run: mix test --include conformance --only conformance

      - name: Upload conformance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-report
          path: "**/junit.xml"
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # interop — produce with one tool, consume with another (STEP-9E–9H,
  # tag `:interop`). Installs the oracle binaries pinned to STEP-9-PLAN and
  # brings up the local registries for the push-based cases.
  # ---------------------------------------------------------------------------
  interop:
    # Heavy integration tier — only on main pushes, not PRs (PRs gate on fast + compat).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Install oracle tools (skopeo, crane, oras, regctl)
        run: |
          # skopeo: a wrapper on PATH that runs the pinned official image against the host's /tmp
          # and network, so the interop tests invoke `skopeo` transparently at a fixed version.
          docker pull "quay.io/skopeo/stable:${SKOPEO_VERSION}"
          mkdir -p "$HOME/bin"
          {
            echo '#!/usr/bin/env bash'
            echo "exec docker run --rm --network host --user \"\$(id -u):\$(id -g)\" -v /tmp:/tmp quay.io/skopeo/stable:${SKOPEO_VERSION} \"\$@\""
          } > "$HOME/bin/skopeo"
          chmod +x "$HOME/bin/skopeo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          go install github.com/google/go-containerregistry/cmd/crane@${CRANE_VERSION}
          go install oras.land/oras/cmd/oras@${ORAS_VERSION}
          go install github.com/regclient/regclient/cmd/regctl@${REGCTL_VERSION}
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Start registry:2 + zot (push-based interop)
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for registries
        run: |
          for url in http://localhost:5000/v2/ http://localhost:5001/v2/; do
            echo "waiting for $url"
            for i in $(seq 1 30); do
              if curl -sf -o /dev/null "$url"; then echo "  up"; break; fi
              if [ "$i" -eq 30 ]; then echo "  $url never came up"; exit 1; fi
              sleep 1
            done
          done

      - run: mix deps.get

      - run: mix test --include interop --only interop

      - name: Stop registries
        if: always()
        run: docker compose -f docker-compose.test.yml down
